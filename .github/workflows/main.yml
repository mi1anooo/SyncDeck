name: SyncDeck Build

on:
  push:
    branches: [ main ]

  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Publish Windows
        run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:EnableCompressionInSingleFile=true -o ./publish

      - name: Show publish output
        run: dir ./publish

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ./dist | Out-Null
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" ".\setup\windows\SyncDeck.iss"

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: SyncDeck-Windows-Portable
          path: ./publish/**

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: SyncDeck-Windows-Installer
          path: ./dist/*.exe
